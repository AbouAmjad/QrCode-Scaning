<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ToolCustody | Worker Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:linear-gradient(145deg,#f0f4fa,#e9eff5); color:#0a2540; padding:1.8rem 1rem; min-height:100vh; }
        .glass-panel { background:rgba(255,255,255,0.92); backdrop-filter:blur(14px); border-radius:2.5rem; box-shadow:0 25px 45px -12px rgba(0,0,0,0.15); border:1px solid rgba(255,255,255,0.7); }
        .back-btn { border-radius:60px; border:1px solid #e2e8f0; padding:0.5rem 1.2rem; background:white; cursor:pointer; font-size:0.85rem; font-weight:600; color:#64748b; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
        .back-btn:hover { background:#f1f5f9; color:#0f2b3d; }
        .avatar-big { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#047857,#065f46); display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:800; color:white; box-shadow:0 10px 20px -6px rgba(4,120,87,0.4); flex-shrink:0; }
        .section-title { font-weight:700; font-size:0.8rem; letter-spacing:0.08em; text-transform:uppercase; color:#1f3a6b; background:rgba(15,43,61,0.07); padding:0.4rem 1.2rem; border-radius:60px; display:inline-block; margin-bottom:1rem; }
        /* Tool held cards */
        .tool-card { border-radius:1.2rem; border:1px solid #eef2f8; background:white; padding:1rem 1.2rem; display:flex; align-items:center; gap:14px; transition:all 0.15s; cursor:pointer; }
        .tool-card:hover { border-color:#3b82f6; box-shadow:0 4px 12px -4px rgba(59,130,246,0.2); transform:translateY(-1px); }
        .tool-card.overdue { border-color:#f59e0b; background:#fffbeb; }
        .tool-icon { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,#fff7ed,#fed7aa); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
        .tool-icon.overdue { background:linear-gradient(135deg,#fff7ed,#fde68a); }
        .days-badge { font-size:0.7rem; font-weight:700; padding:0.2rem 0.7rem; border-radius:20px; }
        .days-today { background:#dcfce7; color:#166534; }
        .days-multi { background:#fef3c7; color:#92400e; }
        /* Timeline */
        .timeline-item { display:flex; gap:14px; padding:0.8rem 0; border-bottom:1px solid #f1f5f9; }
        .timeline-item:last-child { border-bottom:none; }
        .timeline-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; margin-top:2px; }
        .dot-out  { background:#fef2f2; color:#dc2626; }
        .dot-in   { background:#f0fdf4; color:#16a34a; }
        .dot-warn { background:#fffbeb; color:#d97706; }
        .dot-info { background:#eff6ff; color:#2563eb; }
        /* Day group */
        .day-group { background:#f8fafc; border-radius:1rem; padding:1rem 1.2rem; margin-bottom:1rem; border:1px solid #eef2f8; }
        .day-label { font-weight:700; font-size:0.8rem; color:#1f3a6b; margin-bottom:0.8rem; display:flex; align-items:center; gap:8px; }
        .day-label .today-chip { background:#dcfce7; color:#166534; font-size:0.65rem; padding:0.15rem 0.6rem; border-radius:20px; }
        .spinner-wrap { display:flex; justify-content:center; }
        .spinner { width:2rem; height:2rem; border:3px solid #e2e8f0; border-top:3px solid #059669; border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @media(max-width:768px){ body{padding:0.8rem;} .avatar-big{width:60px;height:60px;font-size:1.4rem;} }
    </style>
</head>
<body>
<div class="container-lg px-0 px-md-2" style="max-width:900px;">
  <div class="glass-panel p-3 p-md-5">

    <!-- Header -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i> Back</button>
      <button class="back-btn theme-switch" type="button" onclick="toggleTheme();syncThemeControls()" data-theme-toggle>Switch to Red</button>
      <div class="text-muted small"><i class="bi bi-person-badge me-1"></i> Worker Profile</div>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="text-center py-5">
      <div class="spinner-wrap mb-3"><div class="spinner"></div></div>
      <div class="text-muted">Loading worker profile…</div>
    </div>

    <!-- Content -->
    <div id="mainContent" style="display:none;">

      <!-- Worker Info -->
      <div class="d-flex align-items-center gap-4 mb-5 p-4 rounded-4" style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #bbf7d0;">
        <div class="avatar-big" id="workerAvatar">—</div>
        <div class="flex-grow-1">
          <h2 class="fw-bold mb-1" id="workerName">—</h2>
          <div class="text-muted small" id="workerCode">—</div>
          <div class="d-flex gap-2 mt-2 flex-wrap">
            <span class="badge" style="background:#059669;color:white;border-radius:20px;padding:0.3rem 0.9rem;font-size:0.75rem;"><i class="bi bi-check-circle-fill me-1"></i>Present today</span>
            <span class="badge bg-light text-dark" style="border-radius:20px;padding:0.3rem 0.9rem;font-size:0.75rem;" id="workerToolCount">0 tools held</span>
          </div>
        </div>
      </div>

      <!-- Tools Held NOW -->
      <div class="mb-5">
        <div class="section-title"><i class="bi bi-hammer me-1"></i> Currently Holding</div>
        <div id="toolsHeldNow" class="row g-3"></div>
      </div>

      <!-- Full History by Day -->
      <div>
        <div class="section-title"><i class="bi bi-calendar3 me-1"></i> Full Activity History</div>
        <div id="fullHistory"></div>
      </div>

    </div>

    <!-- Error -->
    <div id="errorState" style="display:none;" class="text-center py-5 text-danger">
      <i class="bi bi-exclamation-triangle-fill fs-1"></i>
      <div class="mt-2" id="errorMsg">Failed to load</div>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="parser.js"></script>
<script>

const params = new URLSearchParams(window.location.search);
const TARGET_CODE = (params.get('code')||"").toUpperCase();
const TARGET_DATE = params.get('date')||"";

async function init(){
  if(!TARGET_CODE){ showError("No worker code specified"); return; }

  try {
    const data = await apiGet({ action: "getData", date: TARGET_DATE });
    if (data && data.error) throw new Error(data.error);

    const {workerName, toolsHeld, workerDailyLog}=CustodyParser.parseForWorker(data, TARGET_CODE, TARGET_DATE);

    // Worker info
    const ini=workerName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('workerAvatar').textContent=ini;
    document.getElementById('workerName').textContent=workerName;
    document.getElementById('workerCode').textContent=TARGET_CODE+' · '+TARGET_DATE;
    document.getElementById('workerToolCount').textContent=`${toolsHeld.reduce((s,t)=>s+t.qty,0)} tool(s) held`;

    // Tools held now
    const toolsDiv=document.getElementById('toolsHeldNow');
    if(!toolsHeld.length){
      toolsDiv.innerHTML=`<div class="col-12"><div class="p-3 rounded-3 text-center text-success" style="background:#f0fdf4;border:1px solid #bbf7d0;"><i class="bi bi-check-circle-fill me-1"></i> No tools currently held — all returned</div></div>`;
    } else {
      toolsDiv.innerHTML=toolsHeld.map(t=>{
        const isOverdue=!t.isToday;
        return `
          <div class="col-md-6">
            <div class="tool-card${isOverdue?' overdue':''}" onclick="window.location.href='tool.html?code=${encodeURIComponent(t.code)}&date=${encodeURIComponent(TARGET_DATE)}'">
              <div class="tool-icon${isOverdue?' overdue':''}">🔧</div>
              <div class="flex-grow-1">
                <div class="fw-bold">${escHtml(t.code)}</div>
                <div class="text-muted small">${escHtml(t.desc)}</div>
                <div class="mt-1">
                  <span class="days-badge ${t.isToday?'days-today':'days-multi'}">
                    ${t.isToday?'Taken today':'Since '+escHtml(t.takenDate)}
                  </span>
                  ${t.qty>1?`<span class="badge bg-danger ms-1">×${t.qty}</span>`:''}
                </div>
              </div>
              <i class="bi bi-chevron-right text-muted"></i>
            </div>
          </div>
        `;
      }).join('');
    }

    // Full history by day
    const histDiv=document.getElementById('fullHistory');
    const dates=Object.keys(workerDailyLog).sort();
    if(!dates.length){
      histDiv.innerHTML=`<div class="text-center text-muted py-4"><i class="bi bi-calendar-x"></i> No activity recorded</div>`;
    } else {
      histDiv.innerHTML=dates.reverse().map(d=>{
        const actions=workerDailyLog[d];
        const isToday=d===TARGET_DATE;
        return `
          <div class="day-group">
            <div class="day-label">
              <i class="bi bi-calendar3"></i> ${escHtml(d)}
              ${isToday?'<span class="today-chip">Selected date</span>':''}
            </div>
            ${actions.map(a=>`
              <div class="timeline-item">
                <div class="timeline-dot ${CustodyParser.dotClass(a.type)}"><i class="bi ${CustodyParser.dotIcon(a.type)}"></i></div>
                <div class="small fw-500 pt-1">${escHtml(a.text)}</div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('');
    }

    document.getElementById('loadingState').style.display='none';
    document.getElementById('mainContent').style.display='block';

  } catch(e){ showError(e.message); }
}

function showError(msg){
  document.getElementById('loadingState').style.display='none';
  document.getElementById('errorState').style.display='block';
  document.getElementById('errorMsg').textContent=msg;
}

document.addEventListener('DOMContentLoaded',init);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
