<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolCustody | Consumables Export</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <script src="config.js"></script>
  <script src="ui.js"></script>
</head>
<body class="tc-page">
  <div class="tc-wrap">
    <div class="tc-shell">
      <div id="app-header"></div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="tc-card">
            <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
              <span class="tc-section-badge mb-0"><i class="bi bi-calendar3"></i> Select dates</span>
              <span class="tc-text-muted small" id="selectedCount">0 selected</span>
            </div>

            <div class="tc-field mb-3">
              <label for="monthSelect">Quick pick by month</label>
              <select id="monthSelect" class="tc-select">
                <option value="">— Choose month —</option>
              </select>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-3">
              <button type="button" class="tc-btn tc-btn-sm" id="btnSelectAll"><i class="bi bi-check2-all"></i> All</button>
              <button type="button" class="tc-btn tc-btn-sm" id="btnClear"><i class="bi bi-x-lg"></i> Clear</button>
              <button type="button" class="tc-btn tc-btn-sm tc-btn-primary" id="btnPreview"><i class="bi bi-eye"></i> Preview</button>
            </div>

            <div class="tc-date-grid" id="dateGrid">
              <div class="text-center tc-text-muted py-4 w-100"><div class="tc-spinner"></div></div>
            </div>
          </div>

          <div class="tc-card mt-3">
            <p class="tc-text-muted small mb-2"><i class="bi bi-info-circle"></i> Codes starting with <strong>C</strong> (e.g. C1-A) are consumables — logged on OUT only, no return tracking.</p>
            <button type="button" class="tc-btn tc-btn-primary w-100" id="btnExport" disabled>
              <i class="bi bi-download"></i> Export selected…
            </button>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="d-flex align-items-center justify-content-between gap-2 mb-3 flex-wrap">
            <span class="tc-section-badge"><i class="bi bi-box-seam"></i> Issuance preview</span>
            <span class="tc-badge-holder" id="previewBadge">—</span>
          </div>
          <div class="tc-table-wrap">
            <div class="table-responsive">
              <table class="tc-table">
                <thead><tr>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Person</th>
                  <th>Code</th>
                  <th>Description</th>
                </tr></thead>
                <tbody id="previewBody">
                  <tr><td colspan="5" class="text-center tc-text-muted py-5"><i class="bi bi-calendar-check"></i> Select dates and click Preview</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tc-modal-backdrop" id="exportModal">
    <div class="tc-modal" style="max-width:420px">
      <div class="tc-modal-head">
        <div>
          <h3 class="h5 mb-1">Export consumables</h3>
          <p class="tc-text-muted small mb-0" id="exportModalHint">Choose file format</p>
        </div>
        <button type="button" class="tc-btn tc-btn-sm" onclick="closeExportModal()"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="tc-modal-body d-grid gap-2">
        <button type="button" class="tc-btn tc-btn-primary" onclick="doExport('csv')"><i class="bi bi-filetype-csv"></i> CSV (Excel compatible)</button>
        <button type="button" class="tc-btn" onclick="doExport('xlsx')"><i class="bi bi-file-earmark-spreadsheet"></i> Excel (.xlsx)</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="parser.js"></script>
  <script>
    let allDates = [];
    let historyRows = [];
    let previewIssues = [];
    const selectedDates = new Set();

    document.addEventListener("DOMContentLoaded", () => TCUI.bootPage(() => {
      TCUI.mountHeader("app-header", {
        active: "consumables",
        title: "Consumables",
        subtitle: "Export issuance log (C codes)",
        icon: "bi-box-seam"
      });
      init();
    }));

    function monthKeyFromDate(d) {
      const m = String(d).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (!m) return "";
      return `${m[3]}-${m[2].padStart(2, "0")}`;
    }

    function monthLabel(key) {
      if (!key) return "";
      const [y, mo] = key.split("-");
      const names = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${names[+mo - 1] || mo} ${y}`;
    }

    function updateSelectedUi() {
      document.getElementById("selectedCount").textContent = `${selectedDates.size} selected`;
      document.getElementById("btnExport").disabled = selectedDates.size === 0;
      document.querySelectorAll("#dateGrid input[type=checkbox]").forEach(cb => {
        cb.checked = selectedDates.has(cb.value);
      });
    }

    function renderDateGrid() {
      const grid = document.getElementById("dateGrid");
      if (!allDates.length) {
        grid.innerHTML = `<div class="text-center tc-text-muted py-4 w-100"><i class="bi bi-calendar-x"></i> No dates found</div>`;
        return;
      }
      grid.innerHTML = allDates.map(d => `
        <label class="tc-date-chip">
          <input type="checkbox" value="${escHtml(d)}" ${selectedDates.has(d) ? "checked" : ""}>
          <span>${escHtml(d)}</span>
        </label>`).join("");
      grid.querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", () => {
          if (cb.checked) selectedDates.add(cb.value);
          else selectedDates.delete(cb.value);
          updateSelectedUi();
        });
      });

      const months = [...new Set(allDates.map(monthKeyFromDate).filter(Boolean))].sort().reverse();
      const sel = document.getElementById("monthSelect");
      sel.innerHTML = '<option value="">— Choose month —</option>';
      months.forEach(k => {
        const o = document.createElement("option");
        o.value = k;
        o.textContent = monthLabel(k);
        sel.appendChild(o);
      });
    }

    async function loadHistory() {
      const data = await apiGet({ action: "getData", date: allDates[0] || "" });
      if (data && data.error) throw new Error(data.error);
      historyRows = Array.isArray(data) ? data : [];
    }

    function runPreview() {
      if (!selectedDates.size) {
        previewIssues = [];
        document.getElementById("previewBody").innerHTML = `<tr><td colspan="5" class="text-center tc-text-muted py-5">Select at least one date</td></tr>`;
        document.getElementById("previewBadge").textContent = "0 rows";
        return;
      }
      previewIssues = CustodyParser.parseConsumableIssues(historyRows, selectedDates);
      document.getElementById("previewBadge").textContent = `${previewIssues.length} row(s)`;
      const tbody = document.getElementById("previewBody");
      if (!previewIssues.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center tc-text-muted py-5"><i class="bi bi-inbox"></i> No consumable OUT scans for selected dates</td></tr>`;
        return;
      }
      tbody.innerHTML = previewIssues.map(r => `
        <tr>
          <td>${escHtml(r.date)}</td>
          <td>${escHtml(r.time)}</td>
          <td>${escHtml(r.person)}</td>
          <td class="fw-bold">${escHtml(r.code)}</td>
          <td>${escHtml(r.description)}</td>
        </tr>`).join("");
    }

    function exportLabel() {
      const arr = [...selectedDates].sort();
      if (arr.length === 1) return arr[0].replace(/[{}]/g, "").replace(/\//g, "-");
      return `${arr.length}-dates`;
    }

    function openExportModal() {
      if (!selectedDates.size) return;
      runPreview();
      document.getElementById("exportModalHint").textContent = `${previewIssues.length} issuance(s) · ${selectedDates.size} date(s)`;
      document.getElementById("exportModal").style.display = "block";
    }

    function closeExportModal() {
      document.getElementById("exportModal").style.display = "none";
    }

    function doExport(format) {
      closeExportModal();
      if (!previewIssues.length) runPreview();
      const label = exportLabel();
      if (format === "xlsx") CustodyParser.exportConsumablesXlsx(previewIssues, label);
      else CustodyParser.exportConsumablesCsv(previewIssues, label);
    }

    async function init() {
      allDates = await loadDateOptions(document.createElement("select"));
      if (allDates.length) selectedDates.add(allDates[0]);
      renderDateGrid();
      updateSelectedUi();
      try {
        await loadHistory();
        if (selectedDates.size) runPreview();
      } catch (e) {
        document.getElementById("previewBody").innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">${escHtml(e.message)}</td></tr>`;
      }

      document.getElementById("btnSelectAll").addEventListener("click", () => {
        allDates.forEach(d => selectedDates.add(d));
        updateSelectedUi();
      });
      document.getElementById("btnClear").addEventListener("click", () => {
        selectedDates.clear();
        updateSelectedUi();
        runPreview();
      });
      document.getElementById("btnPreview").addEventListener("click", runPreview);
      document.getElementById("btnExport").addEventListener("click", openExportModal);
      document.getElementById("monthSelect").addEventListener("change", e => {
        const key = e.target.value;
        if (!key) return;
        allDates.filter(d => monthKeyFromDate(d) === key).forEach(d => selectedDates.add(d));
        updateSelectedUi();
        runPreview();
      });
      document.getElementById("exportModal").addEventListener("click", e => {
        if (e.target.id === "exportModal") closeExportModal();
      });
    }
  </script>
</body>
</html>
