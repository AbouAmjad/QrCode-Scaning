<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolCustody | Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0f172a,#1e293b);color:#e2e8f0;min-height:100vh;padding:1.5rem 1rem}
    .dash-panel{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border-radius:2rem;border:1px solid rgba(148,163,184,0.15);box-shadow:0 25px 50px rgba(0,0,0,0.4)}
    .kpi{border-radius:1.5rem;padding:1.25rem 1.5rem;border:1px solid rgba(255,255,255,0.08);transition:transform .2s}
    .kpi:hover{transform:translateY(-2px)}
    .kpi-red{background:linear-gradient(135deg,#7f1d1d,#991b1b)}
    .kpi-green{background:linear-gradient(135deg,#064e3b,#047857)}
    .kpi-orange{background:linear-gradient(135deg,#92400e,#b45309)}
    .kpi-purple{background:linear-gradient(135deg,#4c1d95,#6d28d9)}
    .card-dark{background:rgba(30,41,59,0.8);border:1px solid rgba(148,163,184,0.12);border-radius:1.25rem}
    .alert-item{padding:.75rem 1rem;border-radius:.75rem;margin-bottom:.5rem;font-size:.85rem;display:flex;gap:10px;align-items:flex-start}
    .alert-warn{background:rgba(245,158,11,0.15);border-left:3px solid #f59e0b}
    .alert-overdue{background:rgba(239,68,68,0.15);border-left:3px solid #ef4444}
    .alert-error{background:rgba(220,38,38,0.2);border-left:3px solid #dc2626}
    .alert-ok{background:rgba(16,185,129,0.15);border-left:3px solid #10b981}
    .holder-row{display:flex;justify-content:space-between;align-items:center;padding:.65rem 0;border-bottom:1px solid rgba(148,163,184,0.1)}
    .holder-row:last-child{border-bottom:none}
    .nav-btn{border-radius:60px;padding:.45rem 1.1rem;font-size:.8rem;font-weight:600;border:1px solid rgba(148,163,184,0.25);background:rgba(30,41,59,0.6);color:#e2e8f0;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .nav-btn:hover{background:rgba(51,65,85,0.9);color:#fff}
    .nav-btn.primary{background:#2563eb;border-color:#2563eb;color:#fff}
    .search-dash{border-radius:60px;border:1px solid rgba(148,163,184,0.25);background:rgba(15,23,42,0.6);color:#e2e8f0;padding:.6rem 1.2rem;width:100%}
    .search-dash:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.25)}
    .search-result{background:rgba(30,41,59,0.9);border-radius:1rem;padding:1rem;margin-top:.75rem;border:1px solid rgba(59,130,246,0.3)}
    .form-sel{border-radius:60px;border:1px solid rgba(148,163,184,0.25);padding:.5rem 1rem;background:rgba(15,23,42,0.6);color:#e2e8f0;font-size:.85rem}
    .spinner{width:2rem;height:2rem;border:3px solid rgba(148,163,184,0.2);border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .live-dot{width:8px;height:8px;background:#10b981;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
</head>
<body>
<div class="container-xl px-0" style="max-width:1400px">
  <div class="dash-panel p-3 p-md-4 p-lg-5">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4 pb-3 border-bottom border-secondary border-opacity-25">
      <div>
        <h2 class="fw-bold mb-1"><i class="bi bi-speedometer2 me-2"></i>Abu Amjad — Live Dashboard</h2>
        <div class="text-secondary small"><span class="live-dot me-1"></span> Auto-refresh · <span id="lastUpdate">—</span></div>
      </div>
      <div class="d-flex flex-wrap gap-2 align-items-center">
        <select id="dateSelect" class="form-sel" style="min-width:200px"></select>
        <button class="nav-btn primary" id="btnRefresh"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        <button type="button" class="nav-btn theme-switch" onclick="toggleTheme();syncThemeControls()" data-theme-toggle>Switch to Red</button>
        <a href="index.html" class="nav-btn"><i class="bi bi-terminal"></i> Terminal</a>
        <a href="results.html" class="nav-btn"><i class="bi bi-table"></i> Overview</a>
        <a href="damage.html" class="nav-btn"><i class="bi bi-exclamation-octagon"></i> Damage</a>
      </div>
    </div>

    <div id="loadingState" class="text-center py-5"><div class="spinner mb-3"></div><div class="text-secondary">Loading dashboard…</div></div>

    <div id="mainContent" style="display:none">
      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3"><div class="kpi kpi-red text-white"><div class="small opacity-75">Checked out</div><div class="display-6 fw-bold" id="kpiOut">0</div></div></div>
        <div class="col-6 col-lg-3"><div class="kpi kpi-green text-white"><div class="small opacity-75">Workers today</div><div class="display-6 fw-bold" id="kpiWorkers">0</div></div></div>
        <div class="col-6 col-lg-3"><div class="kpi kpi-orange text-white"><div class="small opacity-75">Warnings</div><div class="display-6 fw-bold" id="kpiWarn">0</div></div></div>
        <div class="col-6 col-lg-3"><div class="kpi kpi-purple text-white"><div class="small opacity-75">Overdue tools</div><div class="display-6 fw-bold" id="kpiOverdue">0</div></div></div>
      </div>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="card-dark p-4 mb-4">
            <h6 class="fw-bold mb-3"><i class="bi bi-exclamation-triangle me-2 text-warning"></i>Alerts</h6>
            <div id="alertsBox"></div>
          </div>
          <div class="card-dark p-4">
            <h6 class="fw-bold mb-3"><i class="bi bi-search me-2"></i>Quick Lookup</h6>
            <input type="text" id="quickSearch" class="search-dash" placeholder="Enter tool code (I/E/C/B) or worker code (P)…">
            <div id="searchResult"></div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="card-dark p-4 mb-4">
            <h6 class="fw-bold mb-3"><i class="bi bi-trophy me-2 text-warning"></i>Top Holders</h6>
            <div id="topHolders"></div>
          </div>
          <div class="card-dark p-4">
            <h6 class="fw-bold mb-3"><i class="bi bi-lightning me-2"></i>Actions</h6>
            <div class="d-grid gap-2">
              <button class="nav-btn primary justify-content-center" id="btnExport"><i class="bi bi-download"></i> Export CSV</button>
              <a href="results.html" class="nav-btn justify-content-center" id="linkResults"><i class="bi bi-box-seam"></i> Full Inventory</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="errorState" class="text-center py-5 text-danger" style="display:none">
      <i class="bi bi-wifi-off fs-1"></i>
      <div class="mt-2" id="errorMsg">Failed to load</div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="parser.js"></script>
<script>
let activeDate = "";
let lastRows = [];
let lastOverview = null;
let refreshTimer = null;

async function loadDashboard(date) {
  activeDate = date;
  document.getElementById("loadingState").style.display = "block";
  document.getElementById("mainContent").style.display = "none";
  document.getElementById("errorState").style.display = "none";

  try {
    const data = await apiGet({ action: "getData", date });
    if (data && data.error) throw new Error(data.error);
    lastRows = data;
    const dash = CustodyParser.parseDashboard(data, date);
    lastOverview = dash;

    document.getElementById("kpiOut").textContent = dash.totalOut;
    document.getElementById("kpiWorkers").textContent = dash.totalWorkers;
    document.getElementById("kpiWarn").textContent = dash.warnings;
    document.getElementById("kpiOverdue").textContent = dash.overdueCount;

    const alertsBox = document.getElementById("alertsBox");
    if (dash.allClear) {
      alertsBox.innerHTML = `<div class="alert-item alert-ok"><i class="bi bi-check-circle-fill"></i><span>All clear — every tool is back in store. No warnings.</span></div>`;
    } else if (!dash.alerts.length) {
      alertsBox.innerHTML = `<div class="alert-item alert-ok"><i class="bi bi-info-circle"></i><span>${dash.totalOut} tool(s) still out — no critical warnings.</span></div>`;
    } else {
      alertsBox.innerHTML = dash.alerts.map(a => {
        const cls = a.type === "overdue" ? "alert-overdue" : a.type === "error" ? "alert-error" : "alert-warn";
        const icon = a.type === "overdue" ? "bi-clock-history" : "bi-exclamation-triangle-fill";
        return `<div class="alert-item ${cls}"><i class="bi ${icon}"></i><span>${escHtml(a.text)}</span></div>`;
      }).join("");
    }

    const topDiv = document.getElementById("topHolders");
    if (!dash.topHolders.length) {
      topDiv.innerHTML = `<div class="text-secondary small">No tools currently held</div>`;
    } else {
      topDiv.innerHTML = dash.topHolders.map((h, i) => `
        <div class="holder-row">
          <span><strong>#${i + 1}</strong> ${escHtml(h.name)}</span>
          <span class="badge bg-danger">${h.qty} tool(s)</span>
        </div>`).join("");
    }

    document.getElementById("linkResults").href = `results.html`;
    document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } catch (e) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
    document.getElementById("errorMsg").textContent = e.message;
  }
}

document.getElementById("quickSearch").addEventListener("input", e => {
  const q = e.target.value.trim();
  const box = document.getElementById("searchResult");
  if (!q || !lastRows.length) { box.innerHTML = ""; return; }
  const hit = CustodyParser.lookupTool(lastRows, q);
  if (!hit) {
    box.innerHTML = `<div class="search-result text-secondary"><i class="bi bi-search"></i> No match for "${escHtml(q.toUpperCase())}"</div>`;
    return;
  }
  if (hit.type === "tool") {
    box.innerHTML = `<div class="search-result">
      <div class="fw-bold">${escHtml(hit.code)} — ${escHtml(hit.description)}</div>
      <div class="small mt-1">${hit.qty > 0 ? "OUT · " + hit.holderNames.join(", ") : "In store"}</div>
      <a href="tool.html?code=${encodeURIComponent(hit.code)}&date=${encodeURIComponent(activeDate)}" class="nav-btn primary mt-2 d-inline-flex">View history</a>
    </div>`;
  } else {
    const cnt = hit.toolsHeld.reduce((s, t) => s + t.qty, 0);
    box.innerHTML = `<div class="search-result">
      <div class="fw-bold">${escHtml(hit.name)} (${escHtml(hit.code)})</div>
      <div class="small mt-1">${cnt} tool(s) held</div>
      <a href="worker.html?code=${encodeURIComponent(hit.code)}&date=${encodeURIComponent(activeDate)}" class="nav-btn primary mt-2 d-inline-flex">View profile</a>
    </div>`;
  }
});

document.getElementById("btnExport").addEventListener("click", () => {
  if (lastOverview) CustodyParser.exportCsv(lastOverview.tools, activeDate);
});

document.getElementById("btnRefresh").addEventListener("click", () => {
  const d = document.getElementById("dateSelect").value;
  if (d) loadDashboard(d);
});

async function init() {
  const dates = await loadDateOptions(document.getElementById("dateSelect"));
  if (dates.length) {
    document.getElementById("dateSelect").value = dates[0];
    await loadDashboard(dates[0]);
  }
  document.getElementById("dateSelect").addEventListener("change", e => {
    if (e.target.value) loadDashboard(e.target.value);
  });
  refreshTimer = setInterval(() => {
    const d = document.getElementById("dateSelect").value;
    if (d) loadDashboard(d);
  }, AppConfig.DASHBOARD_REFRESH_MS);
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
