<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tool Tracking System - Reports</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            padding-top: 30px;
        }
        .report-container {
            background: #ffffff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }
        .table th {
            background-color: #343a40;
            color: #ffffff;
            text-align: center;
        }
        .table td {
            vertical-align: middle;
        }
        .badge-action {
            font-size: 0.85rem;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="report-container">
        <!-- Header -->
        <h2 class="text-center mb-4">📅 Daily Tool Tracking System</h2>
        
        <!-- Controls Filter -->
        <div class="row g-3 align-items-center justify-content-between mb-4 bg-light p-3 rounded">
            <div class="col-auto">
                <button id="btnBack" class="btn btn-secondary">⬅️ Back to Terminal</button>
            </div>
            <div class="col-md-6 d-flex gap-2">
                <label for="dateSelect" class="form-label my-auto fw-bold text-nowrap">Select Date:</label>
                <select id="dateSelect" class="form-select">
                    <option value="">Loading dates...</option>
                </select>
                <button id="btnLoadData" class="btn btn-primary text-nowrap">Load Data</button>
            </div>
        </div>

        <!-- Report Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-striped hover-table">
                <thead>
                    <tr>
                        <th>Tool Code</th>
                        <th>Tool Description</th>
                        <th>Movement Today (الحركة اليوم)</th>
                        <th>Current In Site (المتبقي بالموقع)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="4" class="text-center text-muted">الرجاء اختيار تاريخ واضغط على Load Data</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- JavaScript Logic -->
<script>
    // ⚠️ حط رابط الـ Web App التابع لجوجل سكربت (المحدث بـ Anyone) بداخل هذا المتغير
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHXMuZcmFT7KrvqR8cygFl-t-oU_Jh4Vr2L4yp1eoT5AQAL00rbjBbUL0aKod3_C8l7g/exec";

    // جلب التوكن المخزن بجلسة المتصفح للحفاظ على الأمان
    const token = localStorage.getItem("session_token") || "abouamjad_secure_session_token";

    document.addEventListener("DOMContentLoaded", function() {
        loadAvailableDates();

        // زر العودة لوحة الفحص
        document.getElementById("btnBack").addEventListener("click", function() {
            window.location.href = "index.html";
        });

        // زر جلب البيانات للتاريخ المحدد
        document.getElementById("btnLoadData").addEventListener("click", function() {
            const selectedDate = document.getElementById("dateSelect").value;
            if (!selectedDate) {
                alert("الرجاء اختيار تاريخ أولاً!");
                return;
            }
            fetchReportData(selectedDate);
        });
    });

    // 1. دالة سحب التواريخ المتاحة من العمود H لتعبئة القائمة المنسدلة
    function loadAvailableDates() {
        const select = document.getElementById("dateSelect");
        
        fetch(`${SCRIPT_URL}?action=getDates&token=${token}`)
            .then(res => res.json())
            .then(dates => {
                select.innerHTML = "";
                if (dates.length === 0 || dates.error) {
                    select.innerHTML = '<option value="">لا توجد تواريخ مسجلة</option>';
                    return;
                }
                // ترتيب التواريخ تنازلياً لتظهر الأيام الأحدث أولاً
                dates.reverse().forEach(date => {
                    const opt = document.createElement("option");
                    opt.value = date;
                    opt.textContent = date;
                    select.appendChild(opt);
                });
            })
            .catch(err => {
                console.error("Error loading dates:", err);
                select.innerHTML = '<option value="">خطأ أثناء جلب التواريخ</option>';
            });
    }

    // 2. دالة جلب البيانات التراكمية وتمريرها لـ دالة الحساب الذكي
    function fetchReportData(date) {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-primary">جاري جلب وتحليل البيانات التراكمية... الرجاء الانتظار</td></tr>`;

        fetch(`${SCRIPT_URL}?action=getData&date=${encodeURIComponent(date)}&token=${token}`)
            .then(res => res.json())
            .then(data => {
                processAndDisplayData(data, date);
            })
            .catch(err => {
                console.error("Error fetching report:", err);
                tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">فشل الاتصال بالسيرفر أو جلب البيانات.</td></tr>`;
            });
    }

    // 3. 🔥 دالة الفرز والتصفية الرياضية (القلب النابض للتقارير)
    function processAndDisplayData(data, selectedDate) {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        if (!data || data.length === 0 || data.error) {
            tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">لا يوجد سجلات نهائياً لغاية هذا التاريخ</td></tr>`;
            return;
        }

        // المستودع المركزي لتتبع حالة كل كود مادة عبر السجل بالكامل
        const globalInventory = {};

        // تحليل السجل التاريخي خطوة بخطوة للوصول للصافي الصحيح
        data.forEach(row => {
            const code = row.toolCode.toUpperCase().trim();
            const desc = row.toolDescription;
            const isTargetDay = row.isTargetDay; 

            // تخطي أكواد المزامنة العامة المفرسنة لوحدها إن وجدت
            if (code === "IN" || code === "OUT" || !code) return;

            // إنشاء تهيئة برمجية للمادة إن لم تكن متواجدة مسبقاً بالسجل
            if (!globalInventory[code]) {
                globalInventory[code] = {
                    description: desc,
                    totalOutEver: 0,
                    totalInEver: 0,
                    scannedToday: false,
                    actionsToday: []
                };
            }

            // تتبع حضور وانصراف الأشخاص (الرموز التي تبدأ بحرف P مثل P101)
            if (code.startsWith("P")) {
                if (isTargetDay) {
                    globalInventory[code].scannedToday = true;
                    globalInventory[code].actionsToday.push("حضور 👤");
                }
            } else {
                // تتبع حركة الـ العُدد والأدوات (Items & PowerTools) بناءً على نمط الفحص عندك
                if (isTargetDay) {
                    globalInventory[code].scannedToday = true;
                }
                
                // آلية الفرز التلقائي: 
                // إذا ضربت كود "IN" مسبوقاً بالرمز أو مدمجاً، يعتبر إرجاع، وإلا يعتبر سحب للموقع
                if (code.includes("IN") || code.includes("RETURN")) {
                    globalInventory[code].totalInEver += 1;
                    if (isTargetDay) globalInventory[code].actionsToday.push("إرجاع 📥");
                } else if (code.includes("OUT")) {
                    globalInventory[code].totalOutEver += 1;
                    if (isTargetDay) globalInventory[code].actionsToday.push("سحب 📤");
                } else {
                    // نظام الـ Toggle التتابعي الذكي (إذا ضربت الكود وكان طالع بيعتبر رجع، وإلا فهو مسحوب)
                    // هيدي الطريقة الأسهل إذا كنت بتضرب نفس كود القطعة بالـ Gun بدون إضافات
                    if (globalInventory[code].totalOutEver > globalInventory[code].totalInEver) {
                        globalInventory[code].totalInEver += 1;
                        if (isTargetDay) globalInventory[code].actionsToday.push("إرجاع 📥");
                    } else {
                        globalInventory[code].totalOutEver += 1;
                        if (isTargetDay) globalInventory[code].actionsToday.push("سحب 📤");
                    }
                }
            }
        });

        // رص وعرض السطور التي تمت عليها حركة اليوم أو الباقية بالموقع من أيام سابقة
        let hasDataToShow = false;

        Object.keys(globalInventory).forEach(code => {
            const item = globalInventory[code];
            
            // المعادلة: (المتبقي بالموقع = إجمالي ما خرج - إجمالي ما دخل) عبر التاريخ
            const netInSite = item.totalOutEver - item.totalInEver;
            const remaining = netInSite > 0 ? netInSite : 0;

            // نُظهر السطر فقط إذا تفاعل اليوم أو له عهدة باقية من أيام مضت
            if (item.scannedToday || (remaining > 0 && !code.startsWith("P"))) {
                hasDataToShow = true;
                
                const tr = document.createElement("tr");
                
                // تجهيز نصوص الحركات اليومية
                let actionBadge = "";
                if (item.actionsToday.length > 0) {
                    // تجميع كافة الحركات الحاصلة بنفس اليوم بداخل خلية واحدة متل ما بالصورة
                    actionBadge = [...new Set(item.actionsToday)].map(a => `<span class="badge bg-info text-dark me-1">${a}</span>`).join(" ");
                } else {
                    actionBadge = `<span class="badge bg-warning text-dark">باقية بالموقع من أيام سابقة ⏳</span>`;
                }

                // كود الأشخاص لا يحسب عُدد متبقية بل يسجل حضور فقط
                const remainingDisplay = code.startsWith("P") ? "-" : `<strong>${remaining}</strong>`;

                tr.innerHTML = `
                    <td class="text-center"><code>${code}</code></td>
                    <td>${item.description || "UNKNOWN DESCRIPTION"}</td>
                    <td class="text-center">${actionBadge}</td>
                    <td class="text-center ${remaining > 0 ? 'table-danger text-danger' : 'table-success text-success'}">
                        ${remainingDisplay}
                    </td>
                `;
                tableBody.appendChild(tr);
            }
        });

        if (!hasDataToShow) {
            tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">المستودع مقفل، ولم تحدث أي حركات بهذا اليوم ولا توجد عُدد مفقودة بالموقع.</td></tr>`;
        }
    }
</script>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
