<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tool Tracking System - Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            padding-top: 30px;
        }
        .report-container {
            background: #ffffff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }
        .table th {
            background-color: #212529;
            color: #ffffff;
            text-align: center;
        }
        .table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="report-container">
        <h2 class="text-center mb-4">⚙️ Daily Tool Tracking System</h2>
        
        <div class="row g-3 align-items-center justify-content-between mb-4 bg-light p-3 rounded">
            <div class="col-auto">
                <button id="btnBack" class="btn btn-secondary">⬅️ Back to Terminal</button>
            </div>
            <div class="col-md-6 d-flex gap-2">
                <label for="dateSelect" class="form-label my-auto fw-bold text-nowrap">Select Date:</label>
                <select id="dateSelect" class="form-select">
                    <option value="">Loading dates...</option>
                </select>
                <button id="btnLoadData" class="btn btn-primary text-nowrap">Load Data</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Tool Code</th>
                        <th>Tool Description</th>
                        <th>Movement Today (الحركة اليوم)</th>
                        <th>Current Holder (المتواجد مع الشخص)</th>
                        <th>Current In Site (المتبقي بالموقع)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" class="text-center text-muted">الرجاء اختيار تاريخ واضغط على Load Data</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ استبدل هذا الرابط برابط الـ Web App الخاص بك من Google Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHXMuZcmFT7KrvqR8cygFl-t-oU_Jh4Vr2L4yp1eoT5AQAL00rbjBbUL0aKod3_C8l7g/exec";
    const token = localStorage.getItem("session_token") || "abouamjad_secure_session_token";

    document.addEventListener("DOMContentLoaded", function() {
        loadAvailableDates();
        document.getElementById("btnBack").addEventListener("click", function() {
            window.location.href = "index.html";
        });
        document.getElementById("btnLoadData").addEventListener("click", function() {
            const selectedDate = document.getElementById("dateSelect").value;
            if (!selectedDate) {
                alert("الرجاء اختيار تاريخ أولاً!");
                return;
            }
            fetchReportData(selectedDate);
        });
    });

    function loadAvailableDates() {
        const select = document.getElementById("dateSelect");
        fetch(`${SCRIPT_URL}?action=getDates&token=${token}`)
            .then(res => res.json())
            .then(dates => {
                select.innerHTML = "";
                if (dates.length === 0 || dates.error) {
                    select.innerHTML = '<option value="">لا توجد تواريخ مسجلة</option>';
                    return;
                }
                dates.reverse().forEach(date => {
                    const opt = document.createElement("option");
                    opt.value = date;
                    opt.textContent = date;
                    select.appendChild(opt);
                });
            })
            .catch(err => {
                console.error("Error loading dates:", err);
                select.innerHTML = '<option value="">خطأ أثناء جلب التواريخ</option>';
            });
    }

    function fetchReportData(date) {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-primary">جاري تحليل السجلات والربط الذكي للأشخاص... الرجاء الانتظار</td></tr>`;

        fetch(`${SCRIPT_URL}?action=getData&date=${encodeURIComponent(date)}&token=${token}`)
            .then(res => res.json())
            .then(data => {
                processAndDisplayData(data, date);
            })
            .catch(err => {
                console.error("Error fetching report:", err);
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">فشل في جلب البيانات من السيرفر.</td></tr>`;
            });
    }

    // 🔥 دالة المعالجة التتابعية الذكية لربط الأدوات بآخر شخص قام بسحبها
    function processAndDisplayData(data, selectedDate) {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        if (!data || data.length === 0 || data.error) {
            tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">لا توجد سجلات نهائياً لغاية هذا التاريخ</td></tr>`;
            return;
        }

        const globalInventory = {};
        
        // متغيرات الذاكرة التتابعية لقراءة السطور وراء بعضها
        let lastActivePersonName = "مستودع عام"; 
        let lastActiveMovementType = "OUT"; // الافتراضي سحب إذا لم يحدد

        data.forEach(row => {
            const code = row.toolCode.toUpperCase().trim();
            const desc = row.toolDescription;
            const isTargetDay = row.isTargetDay;

            if (!code) return;

            // 1. إذا كان الكود هو كود شخص (يبدأ بـ P)
            if (code.startsWith("P")) {
                lastActivePersonName = desc || code; // حفظ اسم الشخص الحالي في الذاكرة لقراءة السطور التالية
                
                if (!globalInventory[code]) {
                    globalInventory[code] = {
                        description: desc,
                        isPerson: true,
                        scannedToday: false,
                        actionsToday: []
                    };
                }
                if (isTargetDay) {
                    globalInventory[code].scannedToday = true;
                    globalInventory[code].actionsToday.push("حضور 👤");
                }
                return; // ننتقل للسطر التالي
            }

            // 2. إذا كان السطر عبارة عن إشارة حركة فقط (IN أو OUT)
            if (code === "IN" || code === "OUT") {
                lastActiveMovementType = code; // حفظ نوع الحركة الحالية في الذاكرة لقراءة السطر التالي للعدة
                return; // ننتقل للسطر التالي
            }

            // 3. إذا وصلنا هنا، يعني السطر الحالي هو كود أداة أو عُدّة (I, E, C...)
            if (!globalInventory[code]) {
                globalInventory[code] = {
                    description: desc,
                    isPerson: false,
                    totalOutEver: 0,
                    totalInEver: 0,
                    scannedToday: false,
                    actionsToday: [],
                    currentHolder: "المستودع 🏠"
                };
            }

            if (isTargetDay) {
                globalInventory[code].scannedToday = true;
            }

            // تطبيق الحركة بناءً على الذاكرة التتابعية المحفوظة من السطور السابقة
            if (lastActiveMovementType === "IN") {
                globalInventory[code].totalInEver += 1;
                globalInventory[code].currentHolder = "المستودع 🏠"; // رجعت للمستودع
                if (isTargetDay) {
                    globalInventory[code].actionsToday.push(`إرجاع من [${lastActivePersonName}] 📥`);
                }
            } else {
                // الحركة المعتمدة هي OUT (سحب)
                globalInventory[code].totalOutEver += 1;
                globalInventory[code].currentHolder = lastActivePersonName; // القطعة أصبحت بعهدة هذا الشخص هلق
                if (isTargetDay) {
                    globalInventory[code].actionsToday.push(`سحب بواسطة [${lastActivePersonName}] 📤`);
                }
            }
        });

        // رص البيانات بداخل الجدول
        let hasDataToShow = false;

        Object.keys(globalInventory).forEach(code => {
            const item = globalInventory[code];

            if (item.isPerson) {
                // عرض حضور الأشخاص اليوم فقط
                if (item.scannedToday) {
                    hasDataToShow = true;
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td class="text-center"><code>${code}</code></td>
                        <td><strong>${item.description}</strong></td>
                        <td class="text-center"><span class="badge bg-success">حضور 👤</span></td>
                        <td class="text-center text-muted">-</td>
                        <td class="text-center text-muted">-</td>
                    `;
                    tableBody.appendChild(tr);
                }
            } else {
                // حساب المتبقي الفعلي للعدد
                const netInSite = item.totalOutEver - item.totalInEver;
                const remaining = netInSite > 0 ? netInSite : 0;
                
                // تصفير اسم الحامل إذا كانت العدة داخل المستودع
                const holderDisplay = remaining > 0 ? `👤 ${item.currentHolder}` : "🏠 في المستودع";

                if (item.scannedToday || remaining > 0) {
                    hasDataToShow = true;
                    const tr = document.createElement("tr");
                    
                    let actionBadges = item.actionsToday.length > 0 
                        ? [...new Set(item.actionsToday)].map(a => `<span class="badge bg-info text-dark me-1 d-block my-1">${a}</span>`).join("")
                        : `<span class="badge bg-warning text-dark">باقية بالموقع من أيام سابقة ⏳</span>`;

                    tr.innerHTML = `
                        <td class="text-center"><code>${code}</code></td>
                        <td>${item.description}</td>
                        <td>${actionBadges}</td>
                        <td class="text-center fw-bold text-secondary">${holderDisplay}</td>
                        <td class="text-center ${remaining > 0 ? 'table-danger text-danger' : 'table-success text-success'}">
                            <strong>${remaining}</strong>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                }
            }
        });

        if (!hasDataToShow) {
            tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">لا توجد حركات عُدد أو حضور أشخاص لهذا اليوم.</td></tr>`;
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
