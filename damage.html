<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolCustody | Damage Reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <script src="config.js"></script>
  <script src="ui.js"></script>
</head>
<body class="tc-page">
  <div class="tc-wrap">
    <div class="tc-shell">
      <div id="app-header"></div>

      <div class="tc-card mb-4">
        <span class="tc-section-badge"><i class="bi bi-plus-circle"></i> Report new damage</span>
        <form id="damageForm" class="mt-3">
          <div class="tc-damage-form-grid">
            <div class="tc-field">
              <label for="toolCode">Tool code *</label>
              <input type="text" id="toolCode" class="tc-input" placeholder="I / E / C / B code" autocomplete="off" required>
              <div class="tc-text-muted small mt-1" id="toolDescHint"></div>
            </div>
            <div class="tc-field">
              <label for="personCode">Person code *</label>
              <input type="text" id="personCode" class="tc-input" placeholder="P code (who damaged)" autocomplete="off" required>
            </div>
            <div class="tc-field">
              <label for="damageQty">Quantity *</label>
              <input type="number" id="damageQty" class="tc-input" min="1" value="1" required>
            </div>
            <div class="tc-field">
              <label for="damageRemark">Remark</label>
              <input type="text" id="damageRemark" class="tc-input" placeholder="Optional notes">
            </div>
          </div>

          <div class="tc-field mt-2">
            <label>Photo of damage</label>
            <div class="tc-photo-box" id="photoBox">
              <div class="tc-photo-placeholder" id="photoPlaceholder">
                <i class="bi bi-camera fs-1 d-block mb-2"></i>
                Take or upload a photo
              </div>
              <img id="photoPreview" alt="Damage preview" style="display:none">
            </div>
            <div class="tc-photo-actions">
              <button type="button" class="tc-btn tc-btn-primary" id="btnCamera"><i class="bi bi-camera-fill"></i> Take photo</button>
              <button type="button" class="tc-btn" id="btnGallery"><i class="bi bi-image"></i> Upload photo</button>
              <button type="button" class="tc-btn" id="btnClearPhoto" style="display:none"><i class="bi bi-x-circle"></i> Remove</button>
            </div>
            <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
          </div>

          <div class="d-flex flex-wrap gap-2 mt-3">
            <button type="submit" class="tc-btn tc-btn-primary" id="btnSubmit"><i class="bi bi-cloud-upload"></i> Submit report</button>
            <button type="reset" class="tc-btn" id="btnResetForm">Clear form</button>
          </div>
          <div id="formMsg" class="tc-form-msg"></div>
        </form>
      </div>

      <div id="loadingState" class="text-center py-5" style="display:none">
        <div class="tc-spinner mb-3"></div>
        <div class="tc-text-muted">Loading damage report…</div>
      </div>

      <div id="mainContent" style="display:none">
        <div class="tc-kpi-grid mb-4">
          <div class="tc-kpi red"><div class="label">Damaged items</div><div class="value" id="kpiItems">0</div></div>
          <div class="tc-kpi orange"><div class="label">Damage count</div><div class="value" id="kpiCount">0</div></div>
          <div class="tc-kpi slate"><div class="label">Unique offenders</div><div class="value" id="kpiPeople">0</div></div>
          <div class="tc-kpi blue"><div class="label">With remarks</div><div class="value" id="kpiRemarks">0</div></div>
        </div>

        <div class="tc-card">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <span class="tc-section-badge"><i class="bi bi-bug"></i> Damage log</span>
            <span class="tc-text-muted small" id="reportState">Ready</span>
          </div>
          <div id="damageList" class="tc-damage-grid"></div>
          <div id="emptyState" class="tc-empty mt-3" style="display:none">
            <i class="bi bi-folder2-open fs-3"></i>
            <div class="fw-semibold mt-2">No damage records for this date</div>
            <div class="small mt-1">Submit a report above or select another date.</div>
          </div>
        </div>
      </div>

      <div id="errorState" class="text-center py-5 text-danger" style="display:none">
        <i class="bi bi-wifi-off fs-1"></i>
        <div class="mt-2" id="errorMsg">Failed to load</div>
      </div>
    </div>
  </div>

  <script>
    let activeDate = "";
    let lastDamageRows = [];
    let photoDataUrl = "";

    document.addEventListener("DOMContentLoaded", () => {
      if (typeof requireAuth === "function" && !requireAuth()) return;
      TCUI.mountHeader("app-header", {
        active: "damage",
        title: "Damage Reports",
        subtitle: "Report damage with photo · sync to Google Sheet",
        icon: "bi-exclamation-octagon",
        toolbar: `
          <select id="dateSelect" class="tc-select"><option value="">Select date</option></select>
          <button type="button" id="btnLoad" class="tc-btn tc-btn-primary"><i class="bi bi-cloud-download"></i> Load</button>
          <button type="button" id="btnRefresh" class="tc-btn"><i class="bi bi-arrow-clockwise"></i></button>`
      });
      init();
    });

    function showFormMsg(text, type) {
      const el = document.getElementById("formMsg");
      el.className = "tc-form-msg" + (type ? " " + type : "");
      el.textContent = text;
      el.style.display = text ? "block" : "none";
    }

    function setPhotoPreview(dataUrl) {
      photoDataUrl = dataUrl || "";
      const img = document.getElementById("photoPreview");
      const ph = document.getElementById("photoPlaceholder");
      const clr = document.getElementById("btnClearPhoto");
      if (photoDataUrl) {
        img.src = photoDataUrl;
        img.style.display = "block";
        ph.style.display = "none";
        clr.style.display = "inline-flex";
      } else {
        img.src = "";
        img.style.display = "none";
        ph.style.display = "block";
        clr.style.display = "none";
      }
    }

    function compressImage(file, maxWidth = 1200, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = Math.round((maxWidth / w) * h); w = maxWidth; }
            const canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = () => reject(new Error("Invalid image"));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error("Could not read file"));
        reader.readAsDataURL(file);
      });
    }

    async function handlePhotoFile(file) {
      if (!file || !file.type.startsWith("image/")) {
        showFormMsg("Please choose an image file.", "err");
        return;
      }
      if (file.size > 8 * 1024 * 1024) {
        showFormMsg("Image too large (max 8 MB).", "err");
        return;
      }
      try {
        setPhotoPreview(await compressImage(file, 1000, 0.75));
        showFormMsg("", "");
      } catch (e) {
        showFormMsg(e.message || "Could not process image", "err");
      }
    }

    async function lookupToolDesc(code) {
      const hint = document.getElementById("toolDescHint");
      if (!code || !isTool(code)) { hint.textContent = ""; return; }
      hint.textContent = "Looking up…";
      try {
        const d = await apiGet({ action: "getDesc", code });
        hint.textContent = (d && d.description) ? d.description : "";
      } catch {
        hint.textContent = "";
      }
    }

    function normalizeDamageRow(row) {
      return {
        code: (row.code || row.productCode || row.toolCode || "").toString().trim(),
        name: row.name || row.productName || row.toolDescription || row.description || "Unnamed product",
        image: row.image || row.photo || row.imageUrl || row.picture || row.productImage || "",
        damagedBy: row.damagedBy || row.damageBy || row.offender || row.person || row.worker || "Unknown",
        count: Number(row.count ?? row.damageCount ?? row.times ?? row.qty ?? 1) || 1,
        remark: row.remark || row.remarks || row.note || row.notes || "No remark",
        date: row.date || row.damageDate || row.rowDate || activeDate || ""
      };
    }

    function renderDamage(items) {
      const list = document.getElementById("damageList");
      const empty = document.getElementById("emptyState");
      list.innerHTML = "";

      document.getElementById("kpiItems").textContent = items.length;
      document.getElementById("kpiCount").textContent = items.reduce((s, i) => s + i.count, 0);
      document.getElementById("kpiPeople").textContent = new Set(items.map(i => i.damagedBy).filter(Boolean)).size;
      document.getElementById("kpiRemarks").textContent = items.filter(i => i.remark && i.remark !== "No remark").length;
      document.getElementById("reportState").textContent = items.length ? `Loaded ${items.length} record(s)` : "No records";

      if (!items.length) { empty.style.display = "block"; return; }
      empty.style.display = "none";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "tc-damage-card";
        const imgBlock = item.image
          ? `<img src="${escHtml(item.image)}" alt="" class="tc-damage-img" onerror="this.outerHTML='<div class=\\'tc-damage-fallback\\'><i class=\\'bi bi-image\\'></i></div>'">`
          : `<div class="tc-damage-fallback"><i class="bi bi-image"></i></div>`;
        card.innerHTML = `
          ${imgBlock}
          <div class="tc-damage-body">
            <div class="tc-damage-title">${escHtml(item.name)}</div>
            <div class="tc-damage-sub">${item.code ? escHtml(item.code) + " · " : ""}${escHtml(item.date || activeDate || "—")}</div>
            <div class="tc-damage-meta">
              <span class="tc-meta-pill red"><i class="bi bi-person-exclamation"></i> ${escHtml(item.damagedBy)}</span>
              <span class="tc-meta-pill warn"><i class="bi bi-repeat"></i> ${item.count}×</span>
              <span class="tc-meta-pill blue"><i class="bi bi-calendar-event"></i> ${escHtml(item.date || activeDate || "N/A")}</span>
            </div>
            <div class="tc-damage-remark"><strong>Remark:</strong> ${escHtml(item.remark)}</div>
          </div>
          <div class="tc-damage-count"><div class="lbl">Count</div><div class="val">${item.count}</div></div>`;
        list.appendChild(card);
      });
    }

    async function loadDamage(date) {
      activeDate = date;
      document.getElementById("loadingState").style.display = "block";
      document.getElementById("mainContent").style.display = "none";
      document.getElementById("errorState").style.display = "none";

      try {
        const response = await apiGet({ action: "getDamage", date });
        if (response && response.error) throw new Error(response.error);
        const rows = Array.isArray(response) ? response
          : Array.isArray(response?.items) ? response.items
          : Array.isArray(response?.rows) ? response.rows
          : Array.isArray(response?.data) ? response.data
          : Array.isArray(response?.damage) ? response.damage : [];
        lastDamageRows = rows.map(normalizeDamageRow).filter(i => i.name || i.code || i.damagedBy);
        renderDamage(lastDamageRows);
        document.getElementById("loadingState").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
      } catch (error) {
        document.getElementById("loadingState").style.display = "none";
        document.getElementById("errorState").style.display = "block";
        document.getElementById("errorMsg").textContent = error.message || "Failed to load";
      }
    }

    async function submitDamageReport(e) {
      e.preventDefault();
      const toolCode = document.getElementById("toolCode").value.trim().toUpperCase();
      const personCode = document.getElementById("personCode").value.trim().toUpperCase();
      const qty = Number(document.getElementById("damageQty").value) || 1;
      const remark = document.getElementById("damageRemark").value.trim();
      const btn = document.getElementById("btnSubmit");

      if (!isTool(toolCode)) {
        showFormMsg("Tool code must start with I, E, C, or B.", "err");
        return;
      }
      if (!personCode.startsWith("P")) {
        showFormMsg("Person code must start with P.", "err");
        return;
      }

      btn.disabled = true;
      showFormMsg("Uploading report and photo…", "busy");

      try {
        const date = document.getElementById("dateSelect").value || "";

        const result = await apiSubmitDamage({
          toolCode,
          personCode,
          qty,
          remark: remark || "No remark",
          date: date || undefined,
          imageBase64: photoDataUrl || undefined
        });
        if (result && result.error === "NO ACTION SPECIFIED") {
          throw new Error("Apps Script not updated. Copy Code.gs.example → Deploy → New version (Anyone).");
        }
        if (result && result.error) throw new Error(result.error);
        if (!result || !result.success) throw new Error("Submit failed — redeploy Code.gs with submitDamage");

        let msg = "Report saved to Google Sheet!";
        if (result.imageSkipped) msg += " (without photo)";
        if (result.warning) msg += " " + result.warning;
        showFormMsg(msg, "ok");
        document.getElementById("damageForm").reset();
        setPhotoPreview("");
        document.getElementById("toolDescHint").textContent = "";

        const reloadDate = (result.item && result.item.date) || date || "";
        await loadDamage(reloadDate);
      } catch (err) {
        showFormMsg(err.message || "Failed to submit", "err");
      } finally {
        btn.disabled = false;
      }
    }

    async function init() {
      const photoInput = document.getElementById("photoInput");
      document.getElementById("btnCamera").addEventListener("click", () => {
        photoInput.setAttribute("capture", "environment");
        photoInput.click();
      });
      document.getElementById("btnGallery").addEventListener("click", () => {
        photoInput.removeAttribute("capture");
        photoInput.click();
      });
      photoInput.addEventListener("change", e => {
        const f = e.target.files && e.target.files[0];
        if (f) handlePhotoFile(f);
        e.target.value = "";
      });
      document.getElementById("btnClearPhoto").addEventListener("click", () => setPhotoPreview(""));
      document.getElementById("toolCode").addEventListener("blur", e => lookupToolDesc(e.target.value.trim().toUpperCase()));
      document.getElementById("damageForm").addEventListener("submit", submitDamageReport);
      document.getElementById("damageForm").addEventListener("reset", () => {
        setPhotoPreview("");
        document.getElementById("toolDescHint").textContent = "";
        showFormMsg("", "");
      });

      const dates = await loadDamageDateOptions(document.getElementById("dateSelect"));
      await loadDamage("");

      document.getElementById("btnLoad").addEventListener("click", () => {
        const d = document.getElementById("dateSelect").value;
        if (d) loadDamage(d);
      });
      document.getElementById("btnRefresh").addEventListener("click", () => {
        const d = document.getElementById("dateSelect").value;
        if (d) loadDamage(d);
      });
      document.getElementById("dateSelect").addEventListener("change", e => {
        loadDamage(e.target.value);
      });
    }
  </script>
</body>
</html>
