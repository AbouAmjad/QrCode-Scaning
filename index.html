<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f4f7f6; min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f4f7f6; padding-bottom: 15px; }
    h2 { color: #2d5016; font-weight: 700; }
    .nav-btns button { padding: 6px 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-left: 5px; font-size: 13px; }
    .btn-report { background: #007bff; color: white; }
    .btn-logout { background: #dc3545; color: white; }
    .status { padding: 12px; border-radius: 12px; text-align: center; font-weight: 700; font-size: 14px; margin-bottom: 20px; letter-spacing: 0.5px; transition: all 0.3s ease; }
    .online { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .offline { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    .scan-area { position: relative; margin-bottom: 25px; }
    #scanInput { width: 100%; padding: 18px; border: 2px solid #e1e5e9; border-radius: 15px; font-size: 18px; outline: none; transition: all 0.3s ease; letter-spacing: 1px; text-transform: uppercase; }
    #scanInput:focus { border-color: #2d5016; box-shadow: 0 0 0 4px rgba(45, 80, 22, 0.15); }
    .counter-badge { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: #2d5016; color: white; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 14px; }
    .log-section { background: #fafafa; border-radius: 15px; padding: 15px; max-height: 400px; overflow-y: auto; border: 1px solid #e1e5e9; }
    .log-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #ffb300; box-shadow: 0 2px 5px rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 4px; transition: all 0.3s ease; }
    .log-header { display: flex; justify-content: space-between; align-items: center; }
    .log-code { font-weight: 700; color: #333; font-size: 16px; }
    .log-description { font-size: 14px; color: #666; font-weight: 500; }
    .log-time { font-size: 11px; color: #999; text-align: right; }
    .sync-status { font-size: 16px; font-weight: bold; }
    .status-pending { color: #ffb300; animation: pulse 1s infinite; }
    .status-synced { color: #2e7d32; }
    .log-item.synced { border-left-color: #2e7d32; background: #fbfdfb; }
    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Scan Terminal</h2>
      <div class="nav-btns">
        <button class="btn-report" onclick="viewResults()">📊 Report</button>
        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
    
    <div id="status" class="status online">ONLINE — READY FOR SCANS</div>
    
    <div class="scan-area">
      <input type="text" id="scanInput" placeholder="READY FOR GUN SCAN..." autocomplete="off">
      <div class="counter-badge" id="counter">0</div>
    </div>
    
    <div class="log-section" id="log"></div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCYD9DLM883Oju6sMGIkNNTv79vY04BOWd_Pb9Fo1m5t-vYoHPIX_AhxRoRmHekqNjGw/exec";

    let isProcessing = false;
    let scanSeq = Number(localStorage.getItem("scanSeq") || 1);
    let tokenValue = localStorage.getItem("token") || "";

    function isLoggedIn() { return tokenValue && tokenValue.length > 0; }

    async function validateToken() {
      if (!isLoggedIn()) return false;
      try {
        const response = await fetch(`${SCRIPT_URL}?action=validate&token=${tokenValue}`, { method: 'GET', cache: 'no-store' });
        const txt = await response.text();
        return txt === "OK";
      } catch (e) { return false; }
    }

    function loadScans() { return JSON.parse(localStorage.getItem("offlineScans") || "[]"); }
    function saveScans(scans) {
      localStorage.setItem("offlineScans", JSON.stringify(scans));
      localStorage.setItem("scanSeq", scanSeq);
    }

    function updateCounter() {
      const scans = loadScans();
      document.getElementById("counter").innerText = scans.filter(s => !s.sent).length;
    }

    function updateOnlineStatus() {
      const statusEl = document.getElementById("status");
      if (navigator.onLine) {
        statusEl.className = "status online"; statusEl.innerText = "ONLINE — SYNC ACTIVE";
      } else {
        statusEl.className = "status offline"; statusEl.innerText = "OFFLINE — STORAGE MODE";
      }
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    function addLog(code, description = "WAITING FOR NETWORK SYNC...") {
      const id = "log_" + Date.now();
      const div = document.createElement("div");
      div.className = "log-item"; div.id = id;
      div.innerHTML = `
        <div class="log-header">
          <div class="log-code">${code.toUpperCase()}</div>
          <span class="sync-status status-pending">●</span>
        </div>
        <div class="log-description">${description.toUpperCase()}</div>
        <div class="log-time">${new Date().toLocaleTimeString().toUpperCase()}</div>
      `;
      document.getElementById("log").prepend(div);
      return id;
    }

    function updateLogDescription(logId, description) {
      const el = document.getElementById(logId);
      if (el) {
        const descDiv = el.querySelector(".log-description");
        if (descDiv) descDiv.textContent = description.toUpperCase();
      }
    }

    function markSynced(id) {
      const el = document.getElementById(id);
      if (el) {
        el.classList.add("synced");
        const statusSpan = el.querySelector(".sync-status");
        if (statusSpan) { statusSpan.textContent = '✓'; statusSpan.className = "sync-status status-synced"; }
      }
    }

    async function checkAuth() {
      const isValid = await validateToken();
      if (!isValid) { window.location = "login.html"; return false; }
      return true;
    }

    function submitScan() {
      const input = document.getElementById("scanInput");
      const code = input.value.trim().toUpperCase(); // الحبر الفوري للكابيتال من الـ Gun
      if (!code) return;

      input.value = ""; input.focus();
      const logId = addLog(code, "SYNCING WITH SERVER...");

      const scans = loadScans();
      scans.push({ code, seq: scanSeq++, sent: false, logId, timestamp: Date.now() });
      saveScans(scans);
      updateCounter();

      processQueue();
    }

    async function processQueue() {
      if (isProcessing || !navigator.onLine) { updateOnlineStatus(); return; }
      isProcessing = true;

      try {
        let scans = loadScans();
        scans.sort((a, b) => a.seq - b.seq); // الحفاظ الحتمي على الترتيب التصاعدي للمسح

        for (const scan of scans) {
          if (scan.sent) continue;
          if (!isLoggedIn()) { window.location = "login.html"; return; }

          try {
            // إرسال كود المادة واستلام النتيجة والوصف بـ Request واحد فقط
            const res = await fetch(`${SCRIPT_URL}?scanData=${encodeURIComponent(scan.code)}&token=${tokenValue}`, { cache: "no-store" });
            const data = await res.json();
            
            if (data.status === "OK" || data.description) {
              updateLogDescription(scan.logId, data.description);
              markSynced(scan.logId);

              const currentScans = loadScans();
              const updated = currentScans.map(s => s.seq === scan.seq ? {...s, sent: true} : s);
              saveScans(updated);
              updateCounter();
            }
            await new Promise(r => setTimeout(r, 200)); // مهدئ أمان لمنع حظر الـ API من جوجل عند تتابع السحبات السريع
          } catch (error) {
            console.error("Sync breaking at seq:", scan.seq);
            break; // كسر الحلقة فوراً عند حدوث خلل حقيقي بالشبكة لمنع بعثرة الترتيب
          }
        }
      } finally {
        isProcessing = false;
        updateOnlineStatus();
      }
    }

    // فحص دوري خفيف كل 5 ثوانٍ لتفريغ الطابور تلقائياً إن وجد معلقاً
    setInterval(processQueue, 5000);

    // فحص صلاحية الدخول كل 30 ثانية
    setInterval(() => { if (!isLoggedIn()) window.location = "login.html"; }, 30000);

    document.getElementById("scanInput").addEventListener("keydown", e => { if (e.key === "Enter") submitScan(); });

    function logout() { localStorage.removeItem("token"); window.location = "login.html"; }
    function viewResults() { window.location = "results.html"; }

    updateOnlineStatus();
    checkAuth().then(isValid => { if (isValid) { updateCounter(); processQueue(); } });
  </script>
</body>
</html>
